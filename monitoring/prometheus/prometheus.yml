global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4001']

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:4002']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:4003']
