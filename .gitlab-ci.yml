  stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

.build_job_template: &build_job_template
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest ./services/$SERVICE_NAME
    - docker push $CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/$SERVICE_NAME:latest

build_frontend:
  <<: *build_job_template
  variables:
    SERVICE_NAME: "frontend"

build_auth:
  <<: *build_job_template
  variables:
    SERVICE_NAME: "auth-service"

build_product:
  <<: *build_job_template
  variables:
    SERVICE_NAME: "product-service"

build_order:
  <<: *build_job_template
  variables:
    SERVICE_NAME: "order-service"

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - echo "$AWS_EC2_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $AWS_EC2_MANAGER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp docker/docker-compose.swarm.yml docker/nginx/nginx.conf ubuntu@$AWS_EC2_MANAGER_IP:~/shopflow/
    - ssh ubuntu@$AWS_EC2_MANAGER_IP "cd ~/shopflow && export REGISTRY=$CI_REGISTRY_IMAGE export TAG=latest export JWT_SECRET=$JWT_SECRET && docker stack deploy -c docker-compose.swarm.yml shopflow_stack"
  only:
    - main
