events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://frontend:80;
    }

    location /auth/ {
      proxy_pass http://auth-service:4001/auth/;
    }

    location /products/ {
      proxy_pass http://product-service:4002/products/;
    }

    location /orders/ {
      proxy_pass http://order-service:4003/orders/;
    }
  }
}
